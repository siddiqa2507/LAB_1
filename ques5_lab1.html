<!DOCTYPE html>
<head>
    <title>Line Break and Horizontal Line Example</title>
</head>
<body>
    <p>
        This is the first paragraph.<br>
        This line appears after the first line break.<br>
        This line appears after the second line break.
    </p>
    <hr>
    <p>
        This is the second paragraph displayed after the horizontal line.
    </p>
    <p>_siddiqa-24BCE2847_</p>
</body>
</html>
